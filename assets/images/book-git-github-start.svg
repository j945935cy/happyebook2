<svg xmlns="http://www.w3.org/2000/svg" width="640" height="900" viewBox="0 0 640 900" role="img" aria-labelledby="title desc">
  <title id="title">Git Start Book 書封</title>
  <desc id="desc">Git 與 GitHub 入門書籍封面圖</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0b3a66" />
      <stop offset="100%" stop-color="#115e9b" />
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#f97316" />
      <stop offset="100%" stop-color="#fb923c" />
    </linearGradient>
  </defs>

  <rect width="640" height="900" fill="url(#bg)" />
  <rect x="42" y="42" width="556" height="816" rx="28" fill="none" stroke="#cbe7ff" stroke-opacity="0.35" stroke-width="2" />

  <g transform="translate(78 130)">
    <rect x="0" y="0" width="210" height="210" rx="26" fill="#ffffff" fill-opacity="0.12" />
    <path d="M62 108l43-43 34 34 82-82 32 32-114 114z" fill="none" stroke="url(#accent)" stroke-width="20" stroke-linecap="round" stroke-linejoin="round" />
  </g>

  <text x="78" y="410" fill="#d9efff" font-size="30" font-family="Segoe UI, Noto Sans TC, sans-serif" letter-spacing="2">VERSION CONTROL STARTER</text>
  <text x="78" y="480" fill="#ffffff" font-size="66" font-weight="700" font-family="Segoe UI, Noto Sans TC, sans-serif">Git Start Book</text>
  <text x="78" y="560" fill="#ffd9bf" font-size="42" font-weight="600" font-family="Segoe UI, Noto Sans TC, sans-serif">Git 與 GitHub 入門</text>

  <rect x="78" y="620" width="238" height="54" rx="27" fill="url(#accent)" />
  <text x="102" y="656" fill="#1e293b" font-size="30" font-weight="700" font-family="Segoe UI, Noto Sans TC, sans-serif">網站閱讀</text>

  <text x="78" y="760" fill="#d9efff" font-size="28" font-family="Segoe UI, Noto Sans TC, sans-serif">從 clone 到 Pull Request</text>
  <text x="78" y="804" fill="#d9efff" font-size="28" font-family="Segoe UI, Noto Sans TC, sans-serif">一步步完成你的第一個專案流程</text>
</svg>
